<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  

  
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
  
  <title>Browser extensions manager UI</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="main_header">
    <div class="main_header1">
      <img src="assets/images/logo.svg" alt="logo">
      </div>
    <div class="main_header2">
      <img id="light-mode" src="assets/images/icon-sun.svg" alt="light_mode">
    </div>
    
  </div>
  <div class="middle_header">
    <h1>Extensions List</h1>
    <div>
      <button id="allBtn">ALL</button><button id="activeBtn">Active</button><button id="inactiveBtn">Inactive</button>
    </div>
  
  </div>
  <div class="container" id="container">

  </div>

</html>
